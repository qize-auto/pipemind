<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PipeMind Yixin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;padding:20px;max-width:1000px;margin:0 auto}
h1{color:#f0f6fc} p{color:#8b949e;margin-bottom:20px}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;margin-bottom:16px}
.stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:14px;min-width:80px;flex:1;text-align:center}
.stat .num{font-size:22px;font-weight:bold}
.stat .label{font-size:11px;color:#8b949e;margin-top:4px}
.green .num{color:#7ee787} .red .num{color:#f85149} .yellow .num{color:#d29922}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:8px;border-bottom:1px solid #30363d;font-size:13px}
th{color:#8b949e;font-size:11px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;margin:4px}
.btn-primary{background:#238636;color:#fff} .btn-danger{background:#da3633;color:#fff}
.btn-secondary{background:#21262d;color:#c9d1d9}
.tag{padding:2px 8px;border-radius:10px;font-size:11px;display:inline-block}
.tag-ok{background:#238636;color:#fff} .tag-fail{background:#da3633;color:#fff}
.tag-auto_fixed{background:#d29922;color:#000}
pre{background:#0d1117;padding:12px;border-radius:8px;font-size:12px;max-height:200px;overflow:auto}
</style>
</head>
<body>
<div id="nav-placeholder"></div>
<script>fetch('/api/nav').then(r=>r.text()).then(h=>document.getElementById('nav-placeholder').innerHTML=h)</script>

<h1>Yixin Guardian</h1>

<div class="stat-row" id="statsRow"></div>

<div class="card">
  <h2 style=margin-bottom:12px>Controls</h2>
  <button class="btn btn-secondary" onclick="doAction('check','Checking')">Check Now</button>
  <button class="btn btn-primary" onclick="doAction('restart','Restarting')">Restart Yixin</button>
  <button class="btn btn-danger" onclick="doAction('stop','Stopping')">Stop Yixin</button>
  <button class="btn btn-secondary" onclick="doAction('auto-fix','Auto-fixing')">Auto-Fix</button>
  <span id="actionResult" style=margin-left:10px;color:#8b949e></span>
</div>

<div class="card">
  <h2 style=margin-bottom:12px>Preset Models</h2>
  <div id="presetList"></div>
  <div id="presetResult" style=margin-top:10px;color:#8b949e;font-size:13px></div>
</div>

<div class="card">
  <h2 style=margin-bottom:12px>Event Log</h2>
  <table><tr><th>Time</th><th>Type</th><th>Message</th></tr><tbody id="eventTable"></tbody></table>
</div>

<div class="card">
  <h2 style=margin-bottom:12px>Config</h2>
  <pre id="configView">Loading...</pre>
</div>

<script>
async function load() {
  const s = await fetch('/api/yixin/status').then(r=>r.json());
  const statusBadge = s.running ? 'Running' : 'Stopped';
  const apiBadge = s.connected ? 'Connected' : 'Disconnected';
  document.getElementById('statsRow').innerHTML =
    '<div class=stat class=' + (s.running?'green':'red') + '><div class=num>' + statusBadge + '</div><div class=label>Process</div></div>' +
    '<div class=stat class=' + (s.connected?'green':'red') + '><div class=num>' + apiBadge + '</div><div class=label>API</div></div>' +
    '<div class=stat><div class=num>' + (s.model||'?') + '</div><div class=label>Model</div></div>' +
    '<div class=stat><div class=num>' + (s.auto_fixes||0) + '</div><div class=label>Auto Fixes</div></div>';

  const presets = await fetch('/api/yixin/presets').then(r=>r.json());
  const presetHtml = presets.map((p,i) =>
    '<button class="btn ' + (p.has_key?'btn-primary':'btn-secondary') + '" onclick="switchPreset(' + i + ')" ' + (!p.has_key?'disabled':'') + '>' + p.name + '</button>'
  ).join('') || '<span style=color:#484f58>No presets</span>';
  document.getElementById('presetList').innerHTML = presetHtml;

  const events = await fetch('/api/yixin/events').then(r=>r.json());
  document.getElementById('eventTable').innerHTML = events.slice(-15).reverse().map(e =>
    '<tr><td>' + (e.time||'').slice(11,19) + '</td><td><span class="tag tag-' + (e.kind||'info') + '">' + (e.kind||'') + '</span></td><td>' + ((e.message||'').slice(0,60)) + '</td></tr>'
  ).join('') || '<tr><td colspan=3 style=text-align:center;color:#484f58>No events</td></tr>';

  const cfg = await fetch('/api/yixin/config').then(r=>r.json());
  document.getElementById('configView').textContent = JSON.stringify(cfg, null, 2);
}

async function doAction(action, label) {
  const r = document.getElementById('actionResult'); r.textContent = label + '...';
  await fetch('/api/yixin/' + action, {method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
  r.textContent = 'Done';
  setTimeout(()=>load(),1000);
}

async function switchPreset(idx) {
  const r = document.getElementById('presetResult'); r.textContent = 'Switching...';
  const d = await fetch('/api/yixin/switch', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({preset:idx})}).then(r=>r.json());
  r.textContent = d.ok ? 'Switched to ' + d.name : d.error;
  setTimeout(()=>load(),1000);
}
load();
</script>
</body>
</html>
